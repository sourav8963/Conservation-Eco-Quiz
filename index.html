            12: { title: "Week 12: Assignment 12", questions: [
                { q: "Captative breeding is an example of", options: ["in-situ conservation", "ex-situ conservation", "in-situ preservation", "ex-situ preservation"], answer: "ex-situ conservation" },
                { q: "Biological control of pest populations is an example of", options: ["provisioning service", "regulating service", "supporting service", "cultural service"], answer: "regulating service" },
                { q: "Zoo is an example of", options: ["in-situ conservation", "ex-situ conservation", "in-situ preservation", "ex-situ preservation"], answer: "ex-situ conservation" },
                { q: "the elephant has a home range of several square kilometres, regulates the ecosystem by its habit of destructive feeding, and people can relate to this animal which is important for conservation. Given this background, the elephant can be called as", options: ["umbrella species", "keystone species", "flagship species", "all of the above"], answer: "all of the above" },
                { q: "As per Wildlife Protection Act 1972 (WPA 1972), wildlife includes any animal, aquatic or land vegetation which forms part of any ____ (fill in the blank)", options: ["ecosystem", "state", "country", "habitat"], answer: "habitat" },
                { q: "the tiger has a home range of several square kilometres, regulates the ecosystem through controlling herbivore populations and trophic cascades, and people come to tiger reserves to watch tigers. Thus, the tiger can be called as", options: ["umbrella species", "keystone species", "flagship species", "all of the above"], answer: "all of the above" },
                { q: "\"the cost of impacts caused by emission of carbon dioxide\" is known as", options: ["cost of carbon", "economic cost of carbon", "social cost of carbon", "cultural cost of carbon"], answer: "social cost of carbon" },
                { q: "Soil formation is an example of", options: ["provisioning service", "regulating service", "supporting service", "cultural service"], answer: "supporting service" },
                { q: "People come to Mehao wildlife sanctuary in Arunachal Pradesh to witness orchids, which in this context would be classified as", options: ["umbrella species", "keystone species", "flagship species", "indicator species"], answer: "flagship species" },
                { q: "Nutrient cycling is an example of", options: ["provisioning service", "regulating service", "supporting service", "cultural service"], answer: "supporting service" }
            ]}
        };

        // --- Application State ---
        let state = {
            selectedWeek: null, 
            selectedWeeksList: [], 
            quizQuestions: [],
            userAnswers: {},
            isSubmitted: false,
            timeElapsed: 0,
            isTimerActive: false,
            isShuffled: true
        };

        let timerInterval = null;

        // --- Utility Functions ---
        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        // --- Core Logic ---
        function toggleWeekSelection(num) {
            const index = state.selectedWeeksList.indexOf(num);
            if (index > -1) {
                state.selectedWeeksList.splice(index, 1);
            } else {
                state.selectedWeeksList.push(num);
            }
            render();
        }

        function clearSelection() {
            state.selectedWeeksList = [];
            render();
        }

        function startQuiz(mode) {
            let rawQuestions = [];
            
            if (mode === 'all') {
                Object.keys(QUIZ_DATA).forEach(k => {
                    rawQuestions = [...rawQuestions, ...QUIZ_DATA[k].questions];
                });
                state.selectedWeek = 'all';
            } else if (mode === 'custom') {
                if (state.selectedWeeksList.length === 0) return;
                state.selectedWeeksList.sort((a,b) => a-b).forEach(k => {
                    rawQuestions = [...rawQuestions, ...QUIZ_DATA[k].questions];
                });
                state.selectedWeek = 'custom';
            } else {
                rawQuestions = QUIZ_DATA[mode].questions;
                state.selectedWeek = mode;
            }

            let preparedQuestions = rawQuestions.map(q => ({
                ...q,
                displayOptions: state.isShuffled ? shuffleArray(q.options) : q.options
            }));

            if (state.isShuffled) {
                preparedQuestions = shuffleArray(preparedQuestions);
            }

            state.quizQuestions = preparedQuestions;
            state.userAnswers = {};
            state.isSubmitted = false;
            state.timeElapsed = 0;
            state.isTimerActive = true;

            startTimer();
            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                state.timeElapsed++;
                updateTimerDisplay();
            }, 1000);
        }

        function updateTimerDisplay() {
            const el = document.getElementById('timer-val');
            if (el) el.innerText = formatTime(state.timeElapsed);
        }

        function handleAnswer(qIdx, option) {
            if (state.isSubmitted) return;
            state.userAnswers[qIdx] = option;
            render();
        }

        function submitQuiz() {
            state.isSubmitted = true;
            clearInterval(timerInterval);
            window.scrollTo({ top: 0, behavior: 'smooth' });
            render();
        }

        function resetToHome() {
            state.selectedWeek = null;
            state.selectedWeeksList = [];
            clearInterval(timerInterval);
            render();
        }

        function toggleShuffle() {
            state.isShuffled = !state.isShuffled;
            render();
        }

        // --- Render Views ---
        function render() {
            const app = document.getElementById('app');
            if (!app) return;
            
            app.innerHTML = state.selectedWeek === null ? renderHome() : renderQuiz();
            
            if (typeof lucide !== 'undefined') {
                lucide.createIcons();
            }
        }

        function renderHome() {
            const sortedKeys = Object.keys(QUIZ_DATA).map(Number).sort((a, b) => a - b);
            const hasSelection = state.selectedWeeksList.length > 0;

            return `
            <div class="max-w-6xl mx-auto px-6 py-16 space-y-12">
                <header class="text-center space-y-4">
                    <div class="inline-flex items-center gap-2 px-3 py-1 bg-emerald-500/10 border border-emerald-500/20 rounded-full text-emerald-400 text-xs font-bold uppercase tracking-widest mb-4">
                        <i data-lucide="leaf" class="w-3 h-3"></i> RZR CORE
                    </div>
                    <h1 class="text-5xl font-black text-white sm:text-7xl bg-clip-text text-transparent bg-gradient-to-b from-white to-slate-500 leading-tight">
                        Conservation Economics
                    </h1>
                    <p class="text-slate-400 text-xl max-w-2xl mx-auto">
                        Assignments Updated (Weeks 0-12)
                    </p>
                </header>

                <div class="bg-white/5 backdrop-blur-2xl rounded-[2.5rem] border border-white/10 p-8 md:p-12 shadow-2xl relative overflow-hidden">
                    
                    <div class="flex flex-col md:flex-row items-center justify-between mb-12 pb-8 border-b border-white/5 gap-6">
                        <div class="flex items-center gap-4">
                            <div class="p-3 bg-emerald-500/20 rounded-2xl border border-emerald-500/30">
                                <i data-lucide="check-square" class="w-6 h-6 text-emerald-400"></i>
                            </div>
                            <div>
                                <h2 class="text-2xl font-bold text-white">Selection Mode</h2>
                                <p class="text-slate-400 text-sm">Pick weeks to customize your mix</p>
                            </div>
                        </div>
                        
                        <div class="flex items-center gap-4">
                            <button onclick="toggleShuffle()" class="flex items-center gap-3 bg-white/5 p-3 px-5 rounded-2xl border border-white/10 hover:bg-white/10 transition-all">
                                <div class="text-right">
                                    <span class="text-xs font-bold text-white block">Shuffle</span>
                                </div>
                                <div class="relative w-10 h-5 rounded-full transition-all ${state.isShuffled ? 'bg-emerald-600' : 'bg-slate-700'}">
                                    <div class="absolute top-1 left-1 bg-white w-3 h-3 rounded-full transition-transform ${state.isShuffled ? 'translate-x-5' : 'translate-x-0'}"></div>
                                </div>
                            </button>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 items-stretch">
                        <!-- All Weeks Card -->
                        <button onclick="startQuiz('all')" class="col-span-1 md:col-span-2 group relative p-8 bg-emerald-600/10 border border-emerald-500/30 rounded-[2rem] hover:bg-emerald-600/20 transition-all text-left overflow-hidden ring-1 ring-emerald-500/10 h-full">
                            <div class="relative z-10">
                                <div class="w-12 h-12 bg-emerald-500 rounded-2xl flex items-center justify-center text-white mb-6 shadow-lg shadow-emerald-500/40">
                                    <i data-lucide="flame" class="w-6 h-6"></i>
                                </div>
                                <h3 class="text-2xl font-bold text-white">Full Syllabus Marathon</h3>
                                <p class="text-sm text-slate-400 mt-2">All questions from everything.</p>
                                <div class="mt-8 flex items-center justify-between text-emerald-400 font-bold">
                                    <span class="text-xs uppercase tracking-widest">Quick Start</span>
                                    <i data-lucide="arrow-right" class="w-5 h-5 group-hover:translate-x-2 transition-transform"></i>
                                </div>
                            </div>
                        </button>

                        ${sortedKeys.map(num => {
                            const isSelected = state.selectedWeeksList.includes(num);
                            return `
                            <div class="relative group h-full">
                                <button onclick="toggleWeekSelection(${num})" 
                                        class="w-full h-full p-6 bg-white/5 border border-white/10 rounded-3xl hover:border-emerald-500/50 hover:bg-white/10 transition-all text-left ${isSelected ? 'week-card-selected' : ''}">
                                    <div class="flex justify-between items-start mb-4">
                                        <div class="w-10 h-10 ${isSelected ? 'bg-emerald-500 text-white' : 'bg-slate-800 text-slate-300'} rounded-xl flex items-center justify-center font-bold border border-white/5 transition-colors">
                                            ${num}
                                        </div>
                                        ${isSelected ? '<i data-lucide="check-circle-2" class="text-emerald-400 w-5 h-5 animate-in zoom-in"></i>' : '<i data-lucide="plus" class="text-slate-600 w-5 h-5 group-hover:text-slate-400 transition-colors"></i>'}
                                    </div>
                                    <h3 class="text-lg font-bold text-white group-hover:text-emerald-400 transition-colors leading-tight">
                                        Week ${num}
                                    </h3>
                                    <p class="text-xs text-slate-500 mt-2 line-clamp-1">${QUIZ_DATA[num].title.split(': ')[1]}</p>
                                </button>
                                
                                <div onclick="event.stopPropagation(); startQuiz(${num});" class="absolute bottom-2 right-2 p-2 text-slate-500 hover:text-emerald-400 transition-colors cursor-pointer hidden md:block" title="Start only this week">
                                    <i data-lucide="play" class="w-4 h-4"></i>
                                </div>
                            </div>
                            `;
                        }).join('')}
                    </div>

                    ${hasSelection ? `
                    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50 animate-in slide-in-from-bottom-10 duration-500 w-[90%] max-w-lg">
                        <div class="bg-emerald-600 rounded-3xl p-4 shadow-2xl flex items-center justify-between border border-emerald-400/30 ring-4 ring-emerald-500/20">
                            <div class="px-4">
                                <p class="text-[10px] uppercase font-black text-emerald-200 tracking-wider">Custom Selection</p>
                                <p class="text-white font-bold">${state.selectedWeeksList.length} Weeks Selected</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="clearSelection()" class="p-3 bg-white/10 hover:bg-white/20 text-white rounded-2xl transition-all">
                                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                                </button>
                                <button onclick="startQuiz('custom')" class="px-6 py-3 bg-white text-emerald-700 font-black rounded-2xl hover:bg-emerald-50 transition-all flex items-center gap-2">
                                    Start Mix <i data-lucide="sparkles" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                    </div>` : ''}
                </div>
            </div>`;
        }

        function renderQuiz() {
            const answeredCount = Object.keys(state.userAnswers).length;
            const progress = (answeredCount / state.quizQuestions.length) * 100;
            
            let weekTitle = "";
            if (state.selectedWeek === 'all') weekTitle = 'Full Marathon';
            else if (state.selectedWeek === 'custom') weekTitle = `Custom Mix (${state.selectedWeeksList.length} Weeks)`;
            else weekTitle = QUIZ_DATA[state.selectedWeek].title;

            let scoreCard = '';
            if (state.isSubmitted) {
                const total = state.quizQuestions.length;
                let correct = 0;
                state.quizQuestions.forEach((q, i) => { if (state.userAnswers[i] === q.answer) correct++; });
                
                scoreCard = `
                <div class="bg-white/5 backdrop-blur-3xl rounded-[3rem] border border-white/10 p-12 md:p-20 text-center mb-12 animate-in zoom-in-95 duration-700">
                    <div class="inline-flex items-center justify-center w-24 h-24 bg-emerald-500/20 text-emerald-400 rounded-3xl mb-8 border border-emerald-500/30">
                        <i data-lucide="award" class="w-12 h-12"></i>
                    </div>
                    <h2 class="text-4xl font-black text-white mb-8">Results</h2>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6 max-w-3xl mx-auto">
                        <div class="bg-white/5 p-8 rounded-3xl border border-white/5">
                            <span class="block text-3xl font-black text-emerald-400">${correct}/${total}</span>
                            <span class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Score</span>
                        </div>
                        <div class="bg-white/5 p-8 rounded-3xl border border-white/5">
                            <span class="block text-3xl font-black text-white">${Math.round((correct/total)*100)}%</span>
                            <span class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Accuracy</span>
                        </div>
                        <div class="bg-white/5 p-8 rounded-3xl border border-white/5">
                            <span class="block text-3xl font-black text-blue-400">${formatTime(state.timeElapsed)}</span>
                            <span class="text-[10px] text-slate-500 uppercase font-bold tracking-widest">Time</span>
                        </div>
                    </div>

                    <div class="mt-12 flex flex-wrap justify-center gap-4">
                        <button onclick="startQuiz('${state.selectedWeek}')" class="px-8 py-4 bg-emerald-600 text-white rounded-2xl font-bold hover:bg-emerald-500 transition-all flex items-center gap-2">
                            <i data-lucide="refresh-ccw" class="w-4 h-4"></i> Retake
                        </button>
                        <button onclick="resetToHome()" class="px-8 py-4 bg-white/10 text-white rounded-2xl font-bold hover:bg-white/20 transition-all flex items-center gap-2">
                            <i data-lucide="home" class="w-4 h-4"></i> Home
                        </button>
                    </div>
                </div>`;
            }

            return `
            <nav class="sticky top-0 z-50 bg-[#020617]/80 backdrop-blur-xl border-b border-white/10 px-6 py-4">
                <div class="max-w-4xl mx-auto flex items-center justify-between">
                    <button onclick="resetToHome()" class="p-2 hover:bg-white/5 rounded-xl transition-all">
                        <i data-lucide="chevron-left" class="w-6 h-6 text-slate-400"></i>
                    </button>
                    <div class="text-center px-4 overflow-hidden">
                        <h2 class="text-sm font-bold text-white truncate">${weekTitle}</h2>
                    </div>
                    <div class="flex items-center gap-2 text-emerald-400 font-mono font-bold">
                        <i data-lucide="clock" class="w-4 h-4"></i>
                        <span id="timer-val">${formatTime(state.timeElapsed)}</span>
                    </div>
                </div>
            </nav>

            <div class="max-w-3xl mx-auto px-6 py-12 pb-32">
                ${!state.isSubmitted ? `
                <div class="mb-12 sticky top-[80px] z-40 bg-[#020617] py-4">
                    <div class="flex justify-between text-[10px] font-black text-slate-500 uppercase mb-2">
                        <span>Progress</span>
                        <span>${answeredCount} of ${state.quizQuestions.length}</span>
                    </div>
                    <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
                        <div class="bg-emerald-500 h-full transition-all duration-500" style="width: ${progress}%"></div>
                    </div>
                </div>` : scoreCard}

                <div class="space-y-8">
                    ${state.quizQuestions.map((q, idx) => {
                        const isCorrect = state.isSubmitted && state.userAnswers[idx] === q.answer;
                        const borderColor = state.isSubmitted ? (isCorrect ? 'border-emerald-500/40' : 'border-red-500/40') : 'border-white/10';

                        return `
                        <div class="bg-white/5 rounded-[2.5rem] border transition-all duration-500 ${borderColor}">
                            <div class="p-8 md:p-12">
                                <div class="flex items-center gap-3 mb-6">
                                    <span class="text-emerald-500 font-black text-xs">Q${idx + 1}</span>
                                    <div class="h-px bg-white/10 flex-grow"></div>
                                </div>
                                <h3 class="text-xl md:text-2xl font-bold text-white leading-snug mb-8">${q.q}</h3>
                                
                                <div class="space-y-3">
                                    ${q.displayOptions.map(opt => {
                                        const active = state.userAnswers[idx] === opt;
                                        const correctOpt = opt === q.answer;
                                        
                                        let style = "bg-white/5 border-white/5 hover:border-white/20";
                                        if (active) style = "bg-emerald-500/10 border-emerald-500/50";
                                        if (state.isSubmitted) {
                                            if (correctOpt) style = "bg-emerald-500/20 border-emerald-500 text-emerald-400";
                                            else if (active) style = "bg-red-500/20 border-red-500 text-red-400";
                                            else style = "bg-white/2 opacity-40 border-transparent";
                                        }

                                        return `
                                        <button onclick="handleAnswer(${idx}, '${opt.replace(/'/g, "\\'")}')" 
                                                class="w-full text-left p-5 rounded-2xl border transition-all flex items-center justify-between group ${style}"
                                                ${state.isSubmitted ? 'disabled' : ''}>
                                            <span class="font-medium">${opt}</span>
                                            ${state.isSubmitted && correctOpt ? '<i data-lucide="check" class="w-5 h-5"></i>' : ''}
                                            ${state.isSubmitted && active && !correctOpt ? '<i data-lucide="x" class="w-5 h-5"></i>' : ''}
                                        </button>`;
                                    }).join('')}
                                </div>
                            </div>
                        </div>`;
                    }).join('')}
                </div>

                ${!state.isSubmitted ? `
                <div class="mt-20 text-center">
                    <button onclick="submitQuiz()" class="px-12 py-5 bg-emerald-600 hover:bg-emerald-500 text-white rounded-[2rem] font-black text-xl shadow-xl shadow-emerald-900/20 transition-all transform hover:-translate-y-1">
                        Finish Practice Session
                    </button>
                </div>` : ''}
            </div>`;
        }

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            render();
        });
    </script>
</body>
</html>
