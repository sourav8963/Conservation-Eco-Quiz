    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            color: #f1f5f9;
            margin: 0;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .animate-blob {
            animation: blob 7s infinite;
        }

        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }

        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.02); }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.3);
            border-radius: 10px;
        }

        .option-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .sidebar-active { transform: translateX(0) !important; }

        .week-chip.active {
            background: rgba(139, 92, 246, 0.2);
            border-color: #8b5cf6;
            color: #c084fc;
        }

        .week-card {
            position: relative;
            background: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            overflow: hidden;
        }

        .week-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at top right, rgba(139, 92, 246, 0.15), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .week-card:hover {
            transform: translateY(-8px);
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5), 0 0 20px rgba(139, 92, 246, 0.1);
        }

        .week-card:hover::before { opacity: 1; }
        .week-icon-container { transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .week-card:hover .week-icon-container { transform: scale(1.1) rotate(5deg); }

                { q: "Wildlife includes any animal which forms part of any ______ (fill in the blank):", options: ["ecosystem", "state", "country", "habitat"], answer: "habitat" },
                { q: "Tiger regulates ecosystem through controlling herbivores. It's called:", options: ["umbrella species", "keystone species", "flagship species", "all of the above"], answer: "all of the above" },
                { q: "Cost of impacts caused by emission of carbon dioxide is:", options: ["cost of carbon", "economic cost of carbon", "social cost of carbon", "cultural cost of carbon"], answer: "social cost of carbon" },
                { q: "Soil formation is an example of:", options: ["provisioning service", "regulating service", "supporting service", "cultural service"], answer: "supporting service" },
                { q: " witness orchids in Arunachal Pradesh classify context as:", options: ["umbrella species", "keystone species", "flagship species", "indicator species"], answer: "flagship species" },
                { q: "Nutrient cycling is an example of:", options: ["provisioning service", "regulating service", "supporting service", "cultural service"], answer: "supporting service" }
            ]}
        };

        let state = {
            selectedWeek: null,
            quizQuestions: [],
            userAnswers: {},
            markedForReview: [],
            isSubmitted: false,
            timeElapsed: 0,
            isTimerActive: false,
            isShuffled: false,
            showSidebar: false,
            customSelection: []
        };

        let timerInterval = null;

        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function toggleCustomWeek(num) {
            const idx = state.customSelection.indexOf(num);
            if (idx > -1) {
                state.customSelection.splice(idx, 1);
            } else {
                state.customSelection.push(num);
            }
            render();
        }

        function toggleMarkForReview(idx) {
            const pos = state.markedForReview.indexOf(idx);
            if (pos > -1) {
                state.markedForReview.splice(pos, 1);
            } else {
                state.markedForReview.push(idx);
            }
            render();
        }

        function startQuiz(weekKey) {
            let rawQuestions = [];
            let sessionTitle = "";

            if (weekKey === 'all') {
                Object.keys(QUIZ_DATA).forEach(k => rawQuestions = [...rawQuestions, ...QUIZ_DATA[k].questions]);
                sessionTitle = "Mega Quiz: Semester Stream";
            } else if (Array.isArray(weekKey)) {
                weekKey.forEach(k => rawQuestions = [...rawQuestions, ...QUIZ_DATA[k].questions]);
                sessionTitle = "Custom Review: " + weekKey.map(w => "W"+w).join(", ");
            } else {
                rawQuestions = QUIZ_DATA[weekKey].questions;
                sessionTitle = QUIZ_DATA[weekKey].title;
            }

            let prepared = rawQuestions.map(q => ({
                ...q,
                displayOptions: state.isShuffled ? shuffleArray(q.options) : q.options
            }));

            if (state.isShuffled) prepared = shuffleArray(prepared);

            state.selectedWeek = weekKey;
            state.quizQuestions = prepared;
            state.userAnswers = {};
            state.markedForReview = [];
            state.isSubmitted = false;
            state.timeElapsed = 0;
            state.isTimerActive = true;
            state.showSidebar = false;
            state.sessionTitle = sessionTitle;

            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                state.timeElapsed++;
                const timerEl = document.getElementById('timer-val');
                if (timerEl) timerEl.innerText = formatTime(state.timeElapsed);
            }, 1000);

            render();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function formatTime(s) {
            return `${Math.floor(s/60)}:${(s%60).toString().padStart(2, '0')}`;
        }

        function handleAnswer(qIdx, option) {
            if (state.isSubmitted) return;
            state.userAnswers[qIdx] = option;
            render();
        }

        function submitQuiz() {
            state.isSubmitted = true;
            state.isTimerActive = false;
            clearInterval(timerInterval);
            window.scrollTo({ top: 0, behavior: 'smooth' });
            render();
        }

        function render() {
            const app = document.getElementById('app');
            // FIX: Use strict null check because Week 0 is 0, which is "falsy" in JavaScript.
            if (state.selectedWeek === null) {
                app.innerHTML = renderHome();
            } else {
                app.innerHTML = renderQuiz();
            }
            lucide.createIcons();
        }

        function renderHome() {
            return `
            <div class="max-w-6xl mx-auto pt-20 px-6 pb-20 animate-in fade-in duration-700">
                <header class="text-center mb-16">
                    <div class="inline-flex items-center gap-2 px-4 py-1.5 bg-violet-500/10 border border-violet-500/20 rounded-full text-violet-400 text-xs font-bold tracking-widest uppercase mb-6">
                        <i data-lucide="sparkles" class="w-3 h-3"></i> Conservation Economics Hub
                    </div>
                    <h1 class="text-6xl font-black text-white mb-6 tracking-tight bg-clip-text text-transparent bg-gradient-to-b from-white to-slate-500">
                        Knowledge Repository
                    </h1>
                    <p class="text-slate-400 text-xl max-w-2xl mx-auto leading-relaxed">
                        Master the principles of sustainability, political philosophy, and ecosystem services.
                    </p>
                </header>

                <div class="glass rounded-[3rem] p-10 border-white/10 mb-10">
                    <div class="flex flex-col md:flex-row items-center justify-between mb-12 pb-8 border-b border-white/5 gap-8">
                        <div class="flex items-center gap-5">
                            <div class="p-4 bg-violet-600/20 rounded-2xl border border-violet-500/30">
                                <i data-lucide="sliders" class="w-6 h-6 text-violet-400"></i>
                            </div>
                            <div>
                                <h2 class="text-2xl font-bold text-white">Exam Parameters</h2>
                                <p class="text-slate-500 text-sm font-medium">Configure your testing environment</p>
                            </div>
                        </div>
                        
                        <div onclick="state.isShuffled = !state.isShuffled; render()" class="flex items-center gap-4 bg-white/5 p-4 px-6 rounded-2xl border border-white/10 cursor-pointer hover:bg-white/10 transition-all group">
                            <div class="flex flex-col items-end">
                                <span class="text-sm font-bold text-white">Shuffle Mode</span>
                                <span class="text-[10px] text-slate-500 font-black uppercase">${state.isShuffled ? 'Randomized' : 'Sequential'}</span>
                            </div>
                            <div class="relative w-12 h-6 rounded-full transition-all duration-300 ${state.isShuffled ? 'bg-violet-600 shadow-[0_0_15px_rgba(139,92,246,0.4)]' : 'bg-slate-700'}">
                                <div class="absolute top-1 left-1 bg-white w-4 h-4 rounded-full transition-transform duration-300 ${state.isShuffled ? 'translate-x-6' : ''}"></div>
                            </div>
                        </div>
                    </div>

                    <div class="mb-12 bg-white/5 p-8 rounded-[2.5rem] border border-white/5">
                        <div class="flex flex-col md:flex-row items-center justify-between gap-6 mb-8">
                            <div>
                                <h3 class="text-xl font-bold text-white">Targeted Selection</h3>
                                <p class="text-slate-500 text-sm">Select specific weeks to focus your review session</p>
                            </div>
                            ${state.customSelection.length > 0 ? `
                                <button onclick="startQuiz(state.customSelection)" class="px-8 py-3 bg-violet-600 text-white rounded-2xl font-black text-sm hover:bg-violet-500 transition-all flex items-center gap-2 shadow-lg shadow-violet-600/20">
                                    Start Selected Review (${state.customSelection.length})
                                    <i data-lucide="play" class="w-4 h-4"></i>
                                </button>
                            ` : ''}
                        </div>
                        <div class="flex flex-wrap gap-3">
                            ${Object.keys(QUIZ_DATA).map(num => `
                                <button onclick="toggleCustomWeek(${num})" 
                                        class="week-chip px-5 py-3 rounded-2xl border border-white/10 bg-white/5 text-sm font-bold transition-all hover:border-violet-500/50 ${state.customSelection.includes(Number(num)) ? 'active' : 'text-slate-400'}">
                                    Week ${num}
                                </button>
                            `).join('')}
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        <button onclick="startQuiz('all')" class="col-span-1 md:col-span-2 group relative week-card p-10 border border-violet-500/30 rounded-[2.5rem] text-left">
                            <div class="relative z-10 h-full flex flex-col justify-between">
                                <div class="mb-12">
                                    <div class="w-16 h-16 bg-violet-600 rounded-[1.5rem] flex items-center justify-center text-white mb-8 shadow-2xl shadow-violet-600/30 week-icon-container">
                                        <i data-lucide="layers" class="w-8 h-8"></i>
                                    </div>
                                    <span class="text-[10px] font-black text-violet-400 uppercase tracking-widest bg-violet-500/10 px-3 py-1 rounded-full border border-violet-500/20">Comprehensive Exam</span>
                                    <h3 class="text-4xl font-black text-white mt-4 tracking-tight">Semester Mega Quiz</h3>
                                    <p class="text-slate-400 mt-4 text-lg leading-relaxed max-w-md">Every single objective from the 13-week syllabus merged into a master review stream.</p>
                                </div>
                                <div class="flex items-center justify-between text-violet-400 font-bold mt-auto">
                                    <span class="text-xs uppercase tracking-[0.2em]">Begin Full Evaluation</span>
                                    <div class="w-12 h-12 rounded-full border border-violet-500/30 flex items-center justify-center group-hover:bg-violet-600 group-hover:text-white transition-all">
                                        <i data-lucide="arrow-right" class="w-5 h-5"></i>
                                    </div>
                                </div>
                            </div>
                        </button>

                        ${Object.keys(QUIZ_DATA).map(num => `
                            <button onclick="startQuiz(${num})" class="group week-card p-8 border border-white/10 rounded-[2.2rem] text-left flex flex-col justify-between h-[320px]">
                                <div class="relative z-10">
                                    <div class="flex justify-between items-start mb-8">
                                        <div class="w-12 h-12 bg-slate-800 rounded-2xl flex items-center justify-center text-slate-300 border border-white/10 week-icon-container">
                                            <i data-lucide="${QUIZ_DATA[num].icon || 'book'}" class="w-5 h-5 group-hover:text-violet-400 transition-colors"></i>
                                        </div>
                                        <div class="px-3 py-1 rounded-lg bg-white/5 border border-white/5 text-[10px] font-black text-slate-500 uppercase tracking-tighter">
                                            W${num}
                                        </div>
                                    </div>
                                    <h3 class="text-2xl font-bold text-white group-hover:text-violet-300 transition-colors leading-tight tracking-tight">
                                        ${QUIZ_DATA[num].title.split(': ')[1]}
                                    </h3>
                                </div>
                                
                                <div class="relative z-10 flex items-center justify-between pt-6 border-t border-white/5">
                                    <div class="flex flex-col">
                                        <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Questions</span>
                                        <span class="text-sm font-bold text-white">10 Objectives</span>
                                    </div>
                                    <div class="w-10 h-10 rounded-full border border-white/10 flex items-center justify-center group-hover:border-violet-500/50 group-hover:bg-violet-500/10 group-hover:text-violet-300 transition-all">
                                        <i data-lucide="chevron-right" class="w-5 h-5 group-hover:translate-x-0.5 transition-transform"></i>
                                    </div>
                                </div>
                            </button>
                        `).join('')}
                    </div>
                </div>
            </div>`;
        }

        function renderQuiz() {
            const answeredCount = Object.keys(state.userAnswers).length;
            const reviewCount = state.markedForReview.length;
            const notTouchedCount = state.quizQuestions.length - answeredCount;
            const progress = (answeredCount / state.quizQuestions.length) * 100;
            const title = state.sessionTitle;

            let scoreCard = '';
            if (state.isSubmitted) {
                let correct = 0;
                state.quizQuestions.forEach((q, i) => { if (state.userAnswers[i] === q.answer) correct++; });
                const pct = Math.round((correct/state.quizQuestions.length)*100);
                
                scoreCard = `
                <div class="mt-8 mb-16 animate-in zoom-in-95 duration-700">
                    <div class="glass rounded-[3.5rem] p-12 md:p-20 text-center relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-violet-500 to-transparent"></div>
                        <div class="inline-flex items-center justify-center w-32 h-32 bg-violet-500/20 text-violet-400 border border-violet-500/30 rounded-[2.5rem] mb-8">
                            <i data-lucide="trophy" class="w-16 h-16"></i>
                        </div>
                        <h2 class="text-5xl font-black text-white mb-4">Results Matrix</h2>
                        <p class="text-slate-400 text-lg mb-12">Targeted review analysis complete.</p>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-8 max-w-4xl mx-auto">
                            <div class="bg-white/5 p-8 rounded-3xl border border-white/5">
                                <span class="block text-4xl font-black text-violet-400 mb-2">${correct}/${state.quizQuestions.length}</span>
                                <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Points Secured</span>
                            </div>
                            <div class="bg-white/5 p-8 rounded-3xl border border-white/5">
                                <span class="block text-4xl font-black text-white mb-2">${pct}%</span>
                                <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Efficiency</span>
                            </div>
                            <div class="bg-white/5 p-8 rounded-3xl border border-white/5">
                                <span class="block text-4xl font-black text-pink-400 mb-2">${formatTime(state.timeElapsed)}</span>
                                <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Review Time</span>
                            </div>
                        </div>

                        <div class="mt-16 flex flex-wrap justify-center gap-4">
                            <button onclick="startQuiz(state.selectedWeek)" class="px-10 py-4 bg-violet-600 text-white rounded-2xl font-bold hover:bg-violet-500 transition-all flex items-center gap-2">
                                <i data-lucide="refresh-ccw" class="w-5 h-5"></i> Retake Batch
                            </button>
                            <button onclick="state.selectedWeek = null; render()" class="px-10 py-4 bg-white/10 text-white rounded-2xl font-bold hover:bg-white/20 border border-white/10 transition-all flex items-center gap-2">
                                <i data-lucide="home" class="w-5 h-5"></i> Library
                            </button>
                        </div>
                    </div>
                </div>`;
            }

            return `
            <div id="side-menu" class="fixed top-0 left-0 h-full w-80 glass z-[100] transition-transform duration-500 -translate-x-full border-y-0 border-l-0 ${state.showSidebar ? 'sidebar-active' : ''}">
                <div class="p-8 border-b border-white/10 flex justify-between items-center">
                    <h3 class="text-xl font-bold text-white">Objective Index</h3>
                    <button onclick="state.showSidebar = false; render()" class="text-slate-500 hover:text-white"><i data-lucide="x"></i></button>
                </div>
                
                <!-- Status Legend -->
                <div class="px-8 py-6 border-b border-white/5 grid grid-cols-2 gap-3 text-[10px] font-black uppercase tracking-widest">
                    <div class="flex items-center gap-2 text-blue-400">
                        <div class="w-3 h-3 rounded-full bg-blue-500/30 border border-blue-500/50"></div>
                        Attempted (${answeredCount})
                    </div>
                    <div class="flex items-center gap-2 text-amber-400">
                        <div class="w-3 h-3 rounded-full bg-amber-500/30 border border-amber-500/50"></div>
                        Review (${reviewCount})
                    </div>
                    <div class="flex items-center gap-2 text-slate-500">
                        <div class="w-3 h-3 rounded-full bg-white/10 border border-white/20"></div>
                        Not Touched (${notTouchedCount})
                    </div>
                </div>

                <div class="p-4 overflow-y-auto max-h-[calc(100vh-180px)] space-y-2">
                    ${state.quizQuestions.map((q, i) => {
                        const isAnswered = state.userAnswers[i] !== undefined;
                        const isMarked = state.markedForReview.includes(i);
                        
                        let btnClass = "bg-white/5 text-slate-400 border-white/5";
                        if (isMarked) btnClass = "bg-amber-500/20 text-amber-300 border-amber-500/30";
                        else if (isAnswered) btnClass = "bg-blue-600/20 text-blue-300 border-blue-500/30";

                        return `
                        <button onclick="document.getElementById('q-${i}').scrollIntoView({behavior:'smooth'}); state.showSidebar = false; render()" 
                                class="w-full p-3 rounded-xl border text-left flex items-center gap-3 transition-all hover:bg-white/10 ${btnClass}">
                            <span class="w-7 h-7 rounded-lg bg-black/40 flex items-center justify-center text-[10px] font-bold border border-white/5">${i+1}</span>
                            <span class="text-xs truncate font-medium flex-1">${q.q}</span>
                            ${isAnswered ? '<i data-lucide="check" class="w-3 h-3 text-blue-400"></i>' : ''}
                            ${isMarked ? '<i data-lucide="bookmark" class="w-3 h-3 text-amber-400 fill-amber-400"></i>' : ''}
                        </button>`;
                    }).join('')}
                </div>
            </div>

            <nav class="sticky top-0 z-[60] bg-[#020617]/80 backdrop-blur-xl border-b border-white/10 px-6 py-4">
                <div class="max-w-6xl mx-auto flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <button onclick="state.showSidebar = true; render()" class="p-3 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl transition-all">
                            <i data-lucide="menu" class="w-5 h-5"></i>
                        </button>
                        <div class="hidden sm:block">
                            <span class="text-[10px] font-black text-violet-500 uppercase tracking-widest block">Semester Mastery</span>
                            <h2 class="text-sm font-bold text-white">${title}</h2>
                        </div>
                    </div>
                    <div class="flex items-center gap-3 bg-slate-900/80 border border-white/10 px-6 py-2.5 rounded-2xl font-mono font-bold text-violet-400 shadow-xl">
                        <i data-lucide="timer" class="w-5 h-5 animate-pulse"></i>
                        <span class="text-xl" id="timer-val">${formatTime(state.timeElapsed)}</span>
                    </div>
                </div>
            </nav>

            <div class="max-w-4xl mx-auto w-full px-6 py-12 pb-32">
                ${!state.isSubmitted ? `
                <div class="sticky top-[90px] z-40 glass p-5 rounded-3xl mb-12 flex items-center justify-between gap-10">
                    <div class="flex-1">
                        <div class="flex justify-between text-[10px] font-black uppercase text-slate-500 mb-2">
                            <span>Analysis Status</span>
                            <span>${Math.round(progress)}% Evaluated</span>
                        </div>
                        <div class="w-full bg-white/5 h-2 rounded-full overflow-hidden border border-white/5">
                            <div class="bg-violet-500 h-full transition-all duration-700" style="width: ${progress}%"></div>
                        </div>
                    </div>
                    <div class="hidden sm:block text-right">
                        <span class="text-2xl font-black text-white">${answeredCount} / ${state.quizQuestions.length}</span>
                    </div>
                </div>` : scoreCard}

                <div class="space-y-10">
                    ${state.quizQuestions.map((q, idx) => {
                        const activeAns = state.userAnswers[idx];
                        const isMarked = state.markedForReview.includes(idx);
                        const isCorrect = state.isSubmitted && activeAns === q.answer;
                        const border = state.isSubmitted ? (isCorrect ? 'border-green-500/30' : 'border-red-500/30') : 'border-white/10';

                        return `
                        <div id="q-${idx}" class="glass rounded-[2.5rem] border transition-all duration-500 overflow-hidden ${border}">
                            <div class="p-10 md:p-14">
                                <div class="flex items-center justify-between mb-6">
                                    <div class="flex items-center gap-4">
                                        <span class="w-10 h-10 bg-violet-600/20 text-violet-400 border border-violet-500/20 rounded-xl flex items-center justify-center font-bold">${idx + 1}</span>
                                        <span class="text-slate-500 font-bold uppercase tracking-widest text-[10px]">Objective Reference</span>
                                    </div>
                                    ${!state.isSubmitted ? `
                                        <button onclick="toggleMarkForReview(${idx})" class="flex items-center gap-2 px-4 py-2 rounded-xl border transition-all ${isMarked ? 'bg-amber-500/20 border-amber-500/40 text-amber-300' : 'bg-white/5 border-white/10 text-slate-500 hover:text-slate-300'}">
                                            <i data-lucide="bookmark" class="w-4 h-4 ${isMarked ? 'fill-amber-400' : ''}"></i>
                                            <span class="text-[10px] font-black uppercase tracking-widest">${isMarked ? 'Reviewing' : 'Review'}</span>
                                        </button>
                                    ` : ''}
                                </div>
                                <h3 class="text-2xl md:text-3xl font-bold text-white leading-tight">${q.q}</h3>
                            </div>
                            <div class="bg-black/20 p-8 md:p-10 grid grid-cols-1 gap-4">
                                ${q.displayOptions.map(opt => {
                                    const selected = activeAns === opt;
                                    const actualCorrect = opt === q.answer;
                                    
                                    let cls = "border-white/5 bg-white/5 hover:border-white/20";
                                    let dot = "border-slate-700";

                                    if (selected) {
                                        cls = "border-violet-500 bg-violet-500/10";
                                        dot = "border-violet-500 bg-violet-500";
                                    }

                                    if (state.isSubmitted) {
                                        if (actualCorrect) {
                                            cls = "border-green-500 bg-green-500/20";
                                            dot = "border-green-500 bg-green-500";
                                        } else if (selected && !actualCorrect) {
                                            cls = "border-red-500 bg-red-500/20";
                                            dot = "border-red-500 bg-red-500";
                                        }
                                    }

                                    return `
                                    <button onclick="handleAnswer(${idx}, '${opt.replace(/'/g, "\\'")}')" 
                                            class="option-btn w-full text-left p-6 rounded-3xl border flex items-center justify-between group ${cls}"
                                            ${state.isSubmitted ? 'disabled' : ''}>
                                        <span class="text-lg font-medium ${selected ? 'text-white' : 'text-slate-400'}">${opt}</span>
                                        <div class="w-6 h-6 rounded-full border-2 transition-all flex items-center justify-center ${dot}">
                                            <i data-lucide="check" class="w-4 h-4 text-white ${selected || (state.isSubmitted && actualCorrect) ? 'block' : 'hidden'}"></i>
                                        </div>
                                    </button>`;
                                }).join('')}
                            </div>
                            ${state.isSubmitted ? `
                                <div class="px-10 py-5 border-t ${isCorrect ? 'bg-green-500/5 text-green-400' : 'bg-red-500/5 text-red-400'} text-xs font-bold flex items-center gap-3">
                                    <i data-lucide="${isCorrect ? 'check-circle' : 'alert-circle'}" class="w-4 h-4"></i>
                                    ${isCorrect ? 'Accurate Response Verified' : 'Standard Response: ' + q.answer}
                                </div>
                            ` : ''}
                        </div>`;
                    }).join('')}
                </div>

                ${!state.isSubmitted ? `
                <div class="pt-24 text-center">
                    <button onclick="submitQuiz()" class="group relative inline-flex items-center gap-4 px-16 py-6 bg-violet-600 hover:bg-violet-500 text-white rounded-full font-black text-xl shadow-[0_20px_50px_rgba(139,92,246,0.3)] transition-all hover:-translate-y-1">
                        Finalize Sequence
                        <i data-lucide="check-circle" class="w-8 h-8 group-hover:scale-110 transition-transform"></i>
                    </button>
                    <p class="mt-4 text-slate-500 text-xs font-black uppercase tracking-widest">Verify all selections before processing</p>
                </div>` : ''}
            </div>`;
        }

        render();
    </script>
</body>
</html>
